<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>נקמת הילד הגמגם</title>
<style>
  :root {
    --paper: #F1ECE0;
    --ink: #0E0D0C;
    --rust: #C13F1F;
    --paper-dim: rgba(241, 236, 224, 0.45);
    --paper-faint: rgba(241, 236, 224, 0.12);
    --mono: ui-monospace, 'JetBrains Mono', 'Menlo', monospace;
    --hebrew: 'MegamgemSans', 'Frank Ruhl Libre', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--ink); color: var(--paper); font-family: var(--mono); overflow: hidden; user-select: none; -webkit-font-smoothing: antialiased; }
  .app { height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }

  header {
    padding: 16px 28px; border-bottom: 1px solid var(--paper-faint);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--paper-dim); direction: ltr;
  }
  header .right { font-variant-numeric: tabular-nums; }
  header b { color: var(--paper); font-weight: 500; }

  .stage {
    position: relative; overflow: hidden;
    min-height: 200px;
    cursor: pointer;
  }
  .center-line {
    position: absolute; top: 0; bottom: 0; left: 50%; width: 1px;
    background: linear-gradient(to bottom, transparent 28%, rgba(193, 63, 31, 0.18) 50%, transparent 72%);
    pointer-events: none; z-index: 6;
  }
  .strip-wrap {
    position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
    height: 140px; overflow: hidden; z-index: 1;
    direction: ltr;
    unicode-bidi: isolate;
  }
  .strip {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 28px;
    /* DOM order = time order; reverse so first cue sits on the right and speech advances left (Hebrew reading). */
    flex-direction: row-reverse;
    direction: ltr;
    unicode-bidi: isolate;
    white-space: nowrap; will-change: transform;
    font-family: var(--hebrew);
    font-size: clamp(36px, 4.8vw, 56px);
    font-weight: 300;
    line-height: 1.35; letter-spacing: -0.005em;
    padding-inline: 50vw;
    box-sizing: content-box;
  }
  .film-word {
    flex-shrink: 0;
    direction: rtl;
    unicode-bidi: isolate;
    text-align: start;
    color: var(--paper-dim);
    opacity: 0.35;
    transition: color 0.32s cubic-bezier(0.4, 0, 0.2, 1),
      opacity 0.32s cubic-bezier(0.4, 0, 0.2, 1),
      transform 0.42s cubic-bezier(0.45, 0, 0.2, 1),
      font-weight 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .film-word.active {
    color: var(--paper);
    opacity: 1;
    font-weight: 800;
    font-size: 1.1em;
    transform: scale(1.05);
  }
  .film-word.near1 { color: rgba(241, 236, 224, 0.52); opacity: 0.52; }
  .film-word.near2 { color: rgba(241, 236, 224, 0.28); opacity: 0.38; }
  .film-word.far { opacity: 0.12; }
  .film-word .letter { color: inherit; }
  .film-utt-break {
    width: 72px; flex-shrink: 0; height: 4px; position: relative;
  }
  .film-utt-break::after {
    content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 6px; height: 6px; border-radius: 50%; background: var(--rust); opacity: 0.45;
  }
  /* Audition "silence" — own timeline slot (no letters); same weight as a word beat */
  .film-gap {
    display: inline-block; flex-shrink: 0; height: 6px; align-self: center;
    border-radius: 3px; background: var(--paper-faint); opacity: 0.42;
    transition: opacity 0.25s, background 0.25s, box-shadow 0.25s;
  }
  .film-gap[role='img'] { cursor: default; }
  .film-gap.active {
    opacity: 0.95;
    background: rgba(193, 63, 31, 0.28);
    box-shadow: 0 0 0 1px rgba(193, 63, 31, 0.35);
  }
  .film-word.ghost .letter { color: inherit; }
  .film-word.ghost.struck .letter {
    text-decoration: line-through;
    text-decoration-color: var(--rust);
    text-decoration-thickness: 2px;
  }
  .film-word.filler .letter { font-style: italic; }
  .film-word.filler.faded .letter { opacity: 0.25; transition: opacity 400ms ease; }
  .word-unit {
    display: inline-block;
    /* margins added programmatically by space-units */
  }
  .space-unit {
    display: inline-block;
    width: 0.32em;
  }
  .letter {
    display: inline-block;
    opacity: 0;
    /* axis values set inline */
  }
  .letter.visible { opacity: 1; }
  .letter.prolong-axis {
    will-change: font-variation-settings;
  }
  .word-unit.ghost .letter {
    color: var(--paper-dim);
  }
  .word-unit.ghost.struck .letter {
    text-decoration: line-through;
    text-decoration-color: var(--rust);
    text-decoration-thickness: 2px;
    transition: text-decoration-color 200ms ease;
  }

  /* v7: rewind attempts (rule 4) — aborted speech attempts that erase right-to-left */
  .letter.rewind-attempt {
    color: var(--paper);
  }
  .letter.rewind-attempt.erasing {
    /* RTL erase: letters fade out via opacity + drift toward start */
    opacity: 0;
    transform: translateX(-0.15em);
    transition: opacity 220ms ease-in, transform 220ms ease-in;
  }
  /* v7: filler events (CSV markers absent from transcript, e.g. אה---ה) */
  .word-unit.filler .letter {
    color: var(--paper-dim);
    font-style: italic;
  }
  .word-unit.filler.faded .letter {
    opacity: 0.25;
    transition: opacity 400ms ease;
  }

  .stutter-tag { display: none; }

  footer {
    padding: 12px 28px 18px; border-top: 1px solid var(--paper-faint);
    display: grid; grid-template-columns: 1fr auto; gap: 18px;
    align-items: center;
  }
  .btn {
    background: transparent; color: var(--paper);
    border: 1px solid var(--paper); padding: 8px 16px;
    font-family: inherit; font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; cursor: pointer; transition: all 150ms ease; white-space: nowrap;
  }
  .btn:hover { background: var(--paper); color: var(--ink); }
  .btn.primary { background: var(--paper); color: var(--ink); }
  .btn.primary:hover { background: var(--rust); color: var(--paper); border-color: var(--rust); }
  .btn.ghost { border-color: var(--paper-faint); color: var(--paper-dim); }
  .btn.ghost:hover { background: var(--paper-faint); color: var(--paper); }

  .timeline { height: 4px; background: var(--paper-faint); position: relative; cursor: pointer; }
  .timeline-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--rust); width: 0%; }
  .timeline-events { position: absolute; top: -3px; height: 10px; width: 100%; pointer-events: none; }
  .marker { position: absolute; top: 50%; transform: translateY(-50%); width: 1px; height: 4px; background: var(--paper-dim); }
  .marker.anchor { width: 2px; height: 10px; background: var(--rust); top: 0; transform: none; }

  .timecode { font-size: 11px; color: var(--paper-dim); font-variant-numeric: tabular-nums; letter-spacing: 0.06em; min-width: 130px; text-align: right; }
  .timecode b { color: var(--paper); font-weight: 500; }

  .speed { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--paper-dim); text-transform: uppercase; letter-spacing: 0.1em; }
  .speed input { width: 70px; accent-color: var(--rust); }

  .audio-zone, #audioInput { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; clip: rect(0,0,0,0); }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="left">נקמת הילד הגמגם</div>
    <div class="right" id="elapsed">00:00 / 00:00</div>
  </header>

  <div class="stage" id="stage">
    <div class="center-line" aria-hidden="true"></div>
    <div class="strip-wrap" dir="ltr" lang="he">
      <div class="strip" id="filmStrip" dir="ltr"></div>
    </div>
    <div class="stutter-tag" id="stutterTag"></div>
  </div>

  <footer>
    <div class="timeline" id="timeline">
      <div class="timeline-events" id="timelineEvents"></div>
      <div class="timeline-progress" id="timelineProgress"></div>
    </div>
    <div class="timecode" id="timecode"><b>00:00</b> / 00:00</div>
    <label class="audio-zone" id="audioZone" aria-hidden="true">
      <span id="audioZoneLabel"></span>
      <input type="file" id="audioInput" accept="audio/*" hidden>
    </label>
  </footer>
</div>

// v7: TIMELINE is mutable so the CSV import can replace it at runtime.
// On boot it holds the v6 data parsed from the inline JSON; after CSV import
// it gets swapped for the regenerated per-word timeline.
const TIMELINE_V2 = JSON.parse(document.getElementById('timelineData').textContent);
let TIMELINE = TIMELINE_V2.map(u => ({
  utterance_id: u.utterance_id,
  raw: u.raw,
  events: u.events.map(e => ({ ...e, stutters: (e.stutters || []).slice() })),
}));
let TIMELINE_SOURCE = 'v2'; // 'v2' = inline transcript, 'csv' = Audition-derived

/** Earliest anchored cue in an utterance (CSV absolute time). */
function minAnchoredStartMs(utt) {
  let m = null;
  for (const e of utt.events) {
    const ms = e.startMs;
    if (ms != null && !Number.isNaN(ms) && (m === null || ms < m)) m = ms;
  }
  return m;
}

/* =========================================================================
   TYPING TIMING — every letter is a typewriter keystroke
   ========================================================================= */
const TIMING = {
  // v6: slowed by 40% (each value × 1.67)
  charTime: 125,            // ms between consecutive letters (the typewriter pace)
  spaceTime: 184,           // pause for a space
  stutterCharTime: 108,     // slightly faster within a rapid-fire stutter
  dashStutterCharTime: 234, // slower within dash-stutter
  prolongHoldPerDash: 334,  // ms held while PROL ramps before next letter
  ghostFadeOut: 467,        // ghost fades after appearing (with strikethrough)
  endOfUtterance: 1170,
  // v7: rewind (rule 4) timings
  rewindAttemptCharTime: 90,    // pace inside an aborted attempt (slightly hurried)
  rewindEraseDuration: 220,     // erase animation duration; matches CSS transition
};

/* =========================================================================
   v7 — AUDITION CSV PIPELINE
   Stage 1: parseAuditionCSV    — text -> tokens (with absolute startMs)
   Stage 2: classifyToken       — apply rules 1 & 2 to a single token
            buildEventsFromTokens — apply rules 3 & 4 across token boundaries
   Stage 3: alignToTranscript   — group events into v2 utterance buckets
   ========================================================================= */

function isHebrewLetter(c) {
  if (!c) return false;
  const code = c.charCodeAt(0);
  return code >= 0x05D0 && code <= 0x05EA; // א..ת
}

function parseAuditionTime(str) {
  // Audition decimal format: "M:SS.mmm", "MM:SS.mmm", or "HH:MM:SS.mmm"
  const parts = str.split(':');
  if (parts.length === 2) {
    const m = parseInt(parts[0], 10);
    const s = parseFloat(parts[1]);
    if (isNaN(m) || isNaN(s)) return null;
    return Math.round((m * 60 + s) * 1000);
  }
  if (parts.length === 3) {
    const h = parseInt(parts[0], 10);
    const m = parseInt(parts[1], 10);
    const s = parseFloat(parts[2]);
    if (isNaN(h) || isNaN(m) || isNaN(s)) return null;
    return Math.round((h * 3600 + m * 60 + s) * 1000);
  }
  return null;
}

function parseAuditionCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.length > 0);
  if (lines.length === 0) return { tokens: [], silences: [] };

  // Audition exports tab-separated. First line is header.
  const headerCells = lines[0].split('\t');
  let nameIdx = headerCells.findIndex(h => /^name$/i.test(h.trim()));
  let startIdx = headerCells.findIndex(h => /^start$/i.test(h.trim()));
  if (nameIdx < 0) nameIdx = 0;
  if (startIdx < 0) startIdx = 1;

  const rawRows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split('\t');
    const name = (cells[nameIdx] || '').trim();
    const start = (cells[startIdx] || '').trim();
    if (!name || !start) continue;
    const startMs = parseAuditionTime(start);
    if (startMs == null) continue;
    if (/^Marker\s*\d+$/i.test(name)) continue;
    rawRows.push({ name, startMs });
  }
  rawRows.sort((a, b) => a.startMs - b.startMs);

  const tokens = [];
  const silences = [];
  for (let i = 0; i < rawRows.length; i++) {
    const row = rawRows[i];
    if (/^silence$/i.test(row.name)) {
      const next = rawRows[i + 1];
      const endMs = next ? next.startMs : row.startMs + 400;
      silences.push({ startMs: row.startMs, endMs });
      continue;
    }
    tokens.push({ raw: row.name, startMs: row.startMs });
  }
  return { tokens, silences };
}

/* extractStutters — apply rules 1 & 2 to a string (no leading/trailing dashes).
   Returns { target, stutters[] }.
   Rule 1: X[-]+X mid-word -> prolong on X, intensity = dash count
   Rule 2: X repeated N>=2 -> repeat on X, intensity = N
           Exception: י or ו repeated exactly 2x is natural Hebrew, NOT a stutter.
*/
function extractStutters(inner) {
  const out = [];          // resolved-word characters
  const stutters = [];
  let i = 0;
  while (i < inner.length) {
    const c = inner[i];

    // Rule 1: c followed by dashes followed by same c
    if (isHebrewLetter(c) && i + 2 < inner.length && inner[i + 1] === '-') {
      let dashEnd = i + 1;
      while (dashEnd < inner.length && inner[dashEnd] === '-') dashEnd++;
      if (dashEnd < inner.length && inner[dashEnd] === c) {
        const dashCount = dashEnd - (i + 1);
        stutters.push({
          type: 'prolong',
          letter: c,
          intensity: dashCount,
          position: out.length,
        });
        out.push(c);
        i = dashEnd + 1; // skip past the second occurrence (same letter, already counted)
        continue;
      }
    }

    // Rule 2: run of identical letter.
    // Threshold is 3+ — runs of exactly 2 are natural Hebrew (ככה, ממש, בכלל,
    // and the yud/vav cases the user called out). Real stutters in the data
    // are always >=3 (יייי-, ווו-, אאאאאאא-, etc.), so this avoids false
    // positives on common double-letter words.
    if (isHebrewLetter(c)) {
      let runEnd = i + 1;
      while (runEnd < inner.length && inner[runEnd] === c) runEnd++;
      const runLen = runEnd - i;
      if (runLen >= 3) {
        stutters.push({
          type: 'repeat',
          letter: c,
          intensity: runLen,
          position: out.length,
        });
        out.push(c); // resolved letter (last in the audible run)
        i = runEnd;
        continue;
      }
      if (runLen === 2) {
        // Natural Hebrew double letter — preserve both glyphs, no stutter.
        out.push(c); out.push(c);
        i = runEnd;
        continue;
      }
    }

    // Plain character (Hebrew letter, space, punctuation, etc.)
    out.push(c);
    i++;
  }
  return { target: out.join(''), stutters };
}

function classifyToken(raw) {
  const leadingMatch = /^-+/.exec(raw);
  const trailingMatch = /-+$/.exec(raw);
  const leadingDashes = leadingMatch ? leadingMatch[0].length : 0;
  const trailingDashes = trailingMatch ? trailingMatch[0].length : 0;
  let inner = raw;
  if (leadingDashes) inner = inner.slice(leadingDashes);
  if (trailingDashes) inner = inner.slice(0, inner.length - trailingDashes);
  const { target, stutters } = extractStutters(inner);
  return { raw, leadingDashes, trailingDashes, inner, target, stutters };
}

/* buildEventsFromTokens — apply rules 3 & 4 across token boundaries.
   Rule 3: token ends in '-+' AND next starts with '-+'  -> prolong-bridge,
           held letter is the last letter of token's inner content.
   Rule 4: token ends in '-+' AND next does NOT start with '-' -> rewind chain,
           collect aborted attempts until a complete token is reached.
*/
function buildEventsFromTokens(tokens) {
  const events = [];
  let i = 0;
  while (i < tokens.length) {
    const tok = tokens[i];
    const cls = classifyToken(tok.raw);

    if (cls.trailingDashes > 0) {
      const next = tokens[i + 1];
      const nextCls = next ? classifyToken(next.raw) : null;

      if (nextCls && nextCls.leadingDashes > 0) {
        // === Rule 3: bridge prolong ===
        // The held letter is the last letter of cls.inner. When the next half
        // begins with the SAME letter, that's the same held sound continuing
        // — collapse it (e.g. ל-+-למה → "למה" not "ללמה"). Otherwise just
        // concatenate (e.g. מג-+-מגם → "מגמגם").
        const heldLetter = cls.inner.slice(-1);
        const nextStartsWithHeld = nextCls.inner.length > 0 && nextCls.inner[0] === heldLetter;
        const combinedInner = nextStartsWithHeld
          ? cls.inner + nextCls.inner.slice(1)
          : cls.inner + nextCls.inner;
        const resolved = extractStutters(combinedInner);
        // Position of the held letter in the resolved word = end of the first half.
        const bridgePosition = Math.max(0, cls.inner.length - 1);
        const bridgeStutter = {
          type: 'prolong-bridge',
          letter: heldLetter,
          intensity: cls.trailingDashes,
          position: bridgePosition,
          holdUntilMs: next.startMs,
        };
        // Drop any rule-1/rule-2 stutter that landed on the same position
        // (its presence would be a false positive caused by the boundary letter).
        const mergedStutters = [bridgeStutter, ...resolved.stutters.filter(s => s.position !== bridgePosition)];
        events.push({
          kind: 'word',
          target: resolved.target,
          startMs: tok.startMs,
          stutters: mergedStutters,
          rawSource: [tok.raw, next.raw],
        });
        i += 2;
        continue;
      }

      // === Rule 4: rewind chain ===
      const attempts = [tok];
      let j = i + 1;
      while (j < tokens.length) {
        const t = tokens[j];
        attempts.push(t);
        if (!/-+$/.test(t.raw)) { j++; break; }
        j++;
      }
      const finalTok = attempts[attempts.length - 1];
      const finalCls = classifyToken(finalTok.raw);
      const attemptInners = attempts.map(t => classifyToken(t.raw).inner);
      const attemptStarts = attempts.map(t => t.startMs);
      events.push({
        kind: 'rewind',
        target: finalCls.target,
        startMs: tok.startMs,
        attempts: attemptInners,                      // raw strings of each attempt (dashes preserved inside)
        attemptStarts,                                 // absolute audio time per attempt
        finalStutters: finalCls.stutters,             // any internal rule 1/2 within the final attempt
        rawSource: attempts.map(t => t.raw),
      });
      i = j;
      continue;
    }

    // No trailing dash. If it has a leading dash but no preceding bridge, treat as orphan filler.
    if (cls.leadingDashes > 0) {
      events.push({
        kind: 'word',
        target: cls.target,
        startMs: tok.startMs,
        stutters: cls.stutters,
        rawSource: [tok.raw],
      });
      i++;
      continue;
    }

    // Regular token (rule 1/2 inner only)
    events.push({
      kind: 'word',
      target: cls.target,
      startMs: tok.startMs,
      stutters: cls.stutters,
      rawSource: [tok.raw],
    });
    i++;
  }
  return events;
}

/* alignToTranscript — group flat event stream into v2 utterance buckets.
   Sequential matching: walk v2 utterances; for each, consume CSV events and
   match against v2 word/ghost targets. CSV cues without a matching transcript
   token at that position are still appended as normal `word` / `rewind`
   events (every Audition marker is a spoken unit). Unmatched v2 words are
   kept at the end of each bucket without startMs.
*/
function normalizeWord(s) {
  if (!s) return '';
  // Strip Hebrew/Latin punctuation, normalize whitespace, and fold Hebrew
  // final-form letters (ם ן ך ף ץ) to their non-final equivalents so words
  // like בן and בנאדם can prefix-match.
  return s
    .replace(/[\.,!?:;'"\u05F3\u05F4()]/g, '')
    .replace(/\u05DA/g, '\u05DB')   // ך → כ
    .replace(/\u05DD/g, '\u05DE')   // ם → מ
    .replace(/\u05DF/g, '\u05E0')   // ן → נ
    .replace(/\u05E3/g, '\u05E4')   // ף → פ
    .replace(/\u05E5/g, '\u05E6')   // ץ → צ
    .replace(/\s+/g, ' ')
    .trim();
}
function wordsMatch(a, b) {
  if (!a || !b) return false;
  const an = normalizeWord(a);
  const bn = normalizeWord(b);
  if (an === bn) return true;
  // Multi-word CSV markers (e.g. "אז אה") — match if v2 word is a token in csv marker
  const aTokens = an.split(' ');
  const bTokens = bn.split(' ');
  if (aTokens.includes(bn) || bTokens.includes(an)) return true;
  // Tolerate prefix/suffix mismatch (final-form letters etc.)
  if (an.length >= 2 && bn.length >= 2 && (an.startsWith(bn) || bn.startsWith(an))) return true;
  return false;
}

function alignToTranscript(events, timelineV2) {
  const result = [];
  let evIdx = 0;

  // Only treat as "next bucket" when CSV matches the *first* v2 event of that
  // bucket — not any of the first 3 words (that caused short cues like אה to
  // close the bucket early and lose sync with Markers01.csv).
  function csvTargetsNextBucketFirstWord(csvTarget, nextBucketIdx) {
    if (nextBucketIdx >= timelineV2.length) return false;
    const nextUtt = timelineV2[nextBucketIdx];
    const first = nextUtt.events && nextUtt.events[0];
    if (!first) return false;
    const peekTarget = first.target || first.text || '';
    return wordsMatch(csvTarget, peekTarget);
  }

  for (let bIdx = 0; bIdx < timelineV2.length; bIdx++) {
    const v2utt = timelineV2[bIdx];
    const bucket = {
      utterance_id: v2utt.utterance_id,
      raw: v2utt.raw,
      events: [],
    };
    const unmatched = v2utt.events.map(e => ({ ...e }));

    while (unmatched.length > 0 && evIdx < events.length) {
      const csvEv = events[evIdx];
      const csvTarget = csvEv.target || '';
      const expected = unmatched[0];
      const expectedTarget = expected.target || expected.text || '';

      if (wordsMatch(csvTarget, expectedTarget)) {
        if (expected.kind === 'ghost') {
          bucket.events.push({ kind: 'ghost', text: expected.text, startMs: csvEv.startMs });
        } else {
          bucket.events.push(csvEv);
        }
        unmatched.shift();
        // Multi-word CSV markers also cover subsequent v2 word(s)
        const csvSubTokens = normalizeWord(csvTarget).split(' ').filter(t => t.length > 0);
        for (let k = 1; k < csvSubTokens.length && unmatched.length > 0; k++) {
          const nextV2 = normalizeWord(unmatched[0].target || unmatched[0].text || '');
          if (csvSubTokens[k] === nextV2 ||
              (nextV2.length >= 2 && (csvSubTokens[k].startsWith(nextV2) || nextV2.startsWith(csvSubTokens[k])))) {
            unmatched.shift();
          } else {
            break;
          }
        }
        evIdx++;
        continue;
      }

      // Do not skip the current v2 word just because the CSV matches a later
      // word (e.g. expected "לא", next "זה", CSV "זה") — that deleted the
      // skipped word from the timeline. Every transcript token and every CSV
      // cue must stay represented.

      // Close this bucket when CSV clearly belongs to the *next* utterance's
      // opening word only (see csvTargetsNextBucketFirstWord).
      if (csvTargetsNextBucketFirstWord(csvTarget, bIdx + 1)) {
        break;
      }

      // Lookahead the other way: maybe the NEXT CSV event matches expected
      if (evIdx + 1 < events.length) {
        const nextCsv = events[evIdx + 1].target || '';
        if (wordsMatch(nextCsv, expectedTarget)) {
          // Extra Audition cue before the one that matches transcript — still
          // a spoken word; keep csvEv.kind ('word' / 'rewind') for rendering.
          bucket.events.push({ ...csvEv });
          evIdx++;
          continue;
        }
      }

      // CSV cue with no transcript slot here — still a spoken word from markers.
      bucket.events.push({ ...csvEv });
      evIdx++;
    }

    // Any v2 events still unmatched stay in this bucket (CSV ran out mid-utterance
    // or words were dropped). They have no startMs, so the legacy interpolation
    // logic will time them.
    unmatched.forEach(e => bucket.events.push({ ...e }));
    result.push(bucket);

    if (evIdx >= events.length) {
      // CSV exhausted — append remaining v2 utterances unchanged (legacy mode)
      for (let k = bIdx + 1; k < timelineV2.length; k++) {
        result.push({
          utterance_id: timelineV2[k].utterance_id,
          raw: timelineV2[k].raw,
          events: timelineV2[k].events.map(e => ({ ...e })),
        });
      }
      break;
    }
  }

  // Any markers after the last aligned bucket (longer CSV than transcript tail)
  if (evIdx < events.length && result.length > 0) {
    const last = result[result.length - 1];
    while (evIdx < events.length) {
      last.events.push({ ...events[evIdx++] });
    }
  }

  for (const bucket of result) {
    let i = bucket.events.length - 1;
    while (i >= 0 && (bucket.events[i].startMs == null || Number.isNaN(bucket.events[i].startMs))) {
      i--;
    }
    const head = bucket.events.slice(0, i + 1);
    const tail = bucket.events.slice(i + 1);
    const withIdx = head.map((e, j) => ({ e, j }));
    withIdx.sort((a, b) => {
      const na = a.e.startMs != null && !Number.isNaN(a.e.startMs) ? a.e.startMs : Infinity;
      const nb = b.e.startMs != null && !Number.isNaN(b.e.startMs) ? b.e.startMs : Infinity;
      if (na !== nb) return na - nb;
      return a.j - b.j;
    });
    bucket.events = withIdx.map(x => x.e).concat(tail);
  }

  return result;
}

/* importAuditionCSV — full pipeline entry point.
   Returns the new timeline (v3 schema) but does NOT install it; caller decides.
*/
function importAuditionCSV(csvText) {
  const { tokens, silences } = parseAuditionCSV(csvText);
  const events = buildEventsFromTokens(tokens);
  const timelineV3 = alignToTranscript(events, TIMELINE_V2);
  return { tokens, events, timeline: timelineV3, silences };
}

/* =========================================================================
   BUILD A FLAT SEQUENCE OF (letter, axis values, when to appear)
   ========================================================================= */

function buildLetterFlowFor(event) {
  /* Returns flat array of letter-info objects (no timing yet).
     v5: handles multiple stutters per word and mixed type.
     v7: handles prolong-bridge stutter and the rewind / filler event kinds. */
  if (event.kind === 'ghost') {
    return Array.from(event.text).map(c => ({char: c, sttr: 0, prol: 0, ghost: true}));
  }
  if (event.kind === 'filler') {
    // Filler tokens (CSV cues with no transcript counterpart, e.g. אה---ה).
    // Prefer Audition raw marker (rawSource) so prolong dashes become visible syllables.
    const rawMarker = (event.rawSource && event.rawSource[0]) || event.raw || event.target || '';
    const display = String(rawMarker).replace(/-/g, '');
    return Array.from(display).map(c => ({char: c, sttr: 0, prol: 0, filler: true}));
  }
  if (event.kind === 'rewind') {
    // Rule 4: aborted attempts that erase right-to-left, then the resolved word types in.
    const arr = [];
    const attempts = event.attempts || [];
    const attemptStarts = event.attemptStarts || [];
    // Each aborted attempt = letters with isRewindAttempt + erase timestamp (= next attempt's start)
    for (let i = 0; i < attempts.length - 1; i++) {
      const display = (attempts[i] || '').replace(/-/g, '');
      const startMs = attemptStarts[i];
      const eraseAtMs = attemptStarts[i + 1];
      Array.from(display).forEach((c, idx) => {
        arr.push({
          char: c, sttr: 0, prol: 0,
          isRewindAttempt: true,
          attemptIdx: i,
          attemptCharIdx: idx,
          attemptCharCount: display.length,
          attemptStartMs: startMs,
          attemptEraseAtMs: eraseAtMs,
        });
      });
    }
    // Final attempt = resolved word with its own internal stutters (rule 1 / rule 2 inner).
    const finalStartMs = attemptStarts[attemptStarts.length - 1];
    const finalEvent = {
      kind: 'word',
      target: event.target,
      stutters: (event.finalStutters || []).slice(),
    };
    const finalFlow = buildLetterFlowFor(finalEvent);
    finalFlow.forEach(li => {
      arr.push({ ...li, isRewindFinal: true, attemptStartMs: finalStartMs });
    });
    return arr;
  }

  // === word kind ===
  const word = event.target;
  const stutters = (event.stutters || []).slice().sort((a, b) => a.position - b.position);

  if (stutters.length === 0) {
    return Array.from(word).map(c => ({char: c, sttr: 0, prol: 0}));
  }

  const arr = [];
  let pos = 0;
  for (const s of stutters) {
    while (pos < s.position) {
      arr.push({char: word[pos], sttr: 0, prol: 0});
      pos++;
    }

    if (s.type === 'prolong') {
      arr.push({
        char: word[pos],
        sttr: 0,
        prol: 1000,
        animatesProl: true,
        prolongIntensity: s.intensity,
      });
      pos++;
    } else if (s.type === 'prolong-bridge') {
      // v7: hold the letter at PROL=1000 until the bridge's continuation marker fires.
      // The hold duration is computed by the scheduler from holdUntilMs vs event's startMs.
      arr.push({
        char: word[pos],
        sttr: 0,
        prol: 1000,
        animatesProl: true,
        prolongIntensity: s.intensity,
        isBridgeProlong: true,
        holdUntilMs: s.holdUntilMs,
      });
      pos++;
    } else if (s.type === 'repeat' || s.type === 'repeat-dash') {
      const N = s.intensity;
      for (let i = 0; i < N; i++) {
        const sttr = N <= 1 ? 0 : Math.round(1000 * (N - 1 - i) / (N - 1));
        arr.push({
          char: s.letter,
          sttr, prol: 0,
          isStutterCopy: i < N - 1,
          isDashStutter: s.type === 'repeat-dash',
        });
      }
      pos++;
    } else if (s.type === 'mixed') {
      const N = s.repeat_count;
      for (let i = 0; i < N; i++) {
        const isLast = i === N - 1;
        const sttr = N <= 1 ? 0 : Math.round(1000 * (N - 1 - i) / (N - 1));
        arr.push({
          char: s.letter,
          sttr,
          prol: isLast ? 1000 : 0,
          animatesProl: isLast,
          prolongIntensity: isLast ? s.prolong_intensity : 0,
          isStutterCopy: !isLast,
          isMixed: true,
        });
      }
      pos++;
    }
  }

  while (pos < word.length) {
    arr.push({char: word[pos], sttr: 0, prol: 0});
    pos++;
  }

  return arr;
}

function buildUtteranceSchedule(utt, uttIdx) {
  /* Returns: { schedule: [{el?, char, appearAt, sttr, prol, ...}],
                wordSpans: [{el, startT, endT, eventIdx}],
                totalDuration }
     v7: when events have absolute `startMs`, anchor each event to that time
     (relative to the utterance start) instead of accumulating from charTime. */
  const schedule = [];
  const wordSpans = [];

  const utteranceStartMs = minAnchoredStartMs(utt);
  const isAbsolute = utteranceStartMs != null;

  let t = 0;

  utt.events.forEach((ev, evIdx) => {
    let eventStart;
    if (isAbsolute && ev.startMs != null) {
      // Event has absolute timing — align its start to the cue time.
      eventStart = ev.startMs - utteranceStartMs;
      t = Math.max(t, eventStart);
    } else {
      if (evIdx > 0) t += TIMING.spaceTime;
      eventStart = t;
    }

    const flow = buildLetterFlowFor(ev);

    const ev0Stutter = (ev.stutters && ev.stutters[0]) || null;
    const isDashStutter = ev0Stutter && ev0Stutter.type === 'repeat-dash';
    const isRepeat = ev0Stutter && (ev0Stutter.type === 'repeat' || ev0Stutter.type === 'repeat-dash');

    flow.forEach((letterInfo, idx) => {
      // v7: rewind attempts override the typewriter timing — each attempt's
      // letters are spread across the time between attempt start and erase.
      if (letterInfo.attemptStartMs != null && isAbsolute) {
        const attemptStartRel = letterInfo.attemptStartMs - utteranceStartMs;
        if (letterInfo.isRewindAttempt) {
          // Distribute aborted-attempt letters across [attemptStart, eraseAt]
          const eraseRel = letterInfo.attemptEraseAtMs != null
            ? letterInfo.attemptEraseAtMs - utteranceStartMs
            : attemptStartRel + letterInfo.attemptCharCount * TIMING.rewindAttemptCharTime;
          const span = Math.max(eraseRel - attemptStartRel - TIMING.rewindEraseDuration, 0);
          const perChar = letterInfo.attemptCharCount > 1
            ? span / letterInfo.attemptCharCount
            : 0;
          t = attemptStartRel + perChar * letterInfo.attemptCharIdx;
        } else if (letterInfo.isRewindFinal) {
          // Final resolved word starts at the last attempt's startMs
          if (letterInfo.attemptCharIdx === 0 || idx === 0 || schedule.length === 0 || schedule[schedule.length - 1].appearAt < attemptStartRel) {
            t = Math.max(t, attemptStartRel);
          }
        }
      }

      schedule.push({
        evIdx,
        char: letterInfo.char,
        appearAt: t,
        sttr: letterInfo.sttr,
        prol: letterInfo.prol,
        animatesProl: !!letterInfo.animatesProl,
        prolongIntensity: letterInfo.prolongIntensity || 0,
        ghost: !!letterInfo.ghost,
        filler: !!letterInfo.filler,
        isStutterCopy: !!letterInfo.isStutterCopy,
        isDashStutter: !!letterInfo.isDashStutter,
        isBridgeProlong: !!letterInfo.isBridgeProlong,
        holdUntilMsAbs: letterInfo.holdUntilMs || null,
        isRewindAttempt: !!letterInfo.isRewindAttempt,
        isRewindFinal: !!letterInfo.isRewindFinal,
        attemptIdx: letterInfo.attemptIdx,
        attemptCharIdx: letterInfo.attemptCharIdx,
        attemptCharCount: letterInfo.attemptCharCount,
        attemptEraseAtAbs: letterInfo.attemptEraseAtMs || null,
      });

      // Advance time
      let step = letterInfo.isRewindAttempt ? TIMING.rewindAttemptCharTime : TIMING.charTime;
      if (isRepeat && letterInfo.isStutterCopy) {
        step = isDashStutter ? TIMING.dashStutterCharTime : TIMING.stutterCharTime;
      }
      t += step;

      // Prolongation hold
      if (letterInfo.animatesProl) {
        if (letterInfo.isBridgeProlong && letterInfo.holdUntilMs != null && isAbsolute) {
          // Bridge prolong: hold until the continuation marker fires (absolute audio time).
          t = Math.max(t, letterInfo.holdUntilMs - utteranceStartMs);
        } else {
          t += letterInfo.prolongIntensity * TIMING.prolongHoldPerDash;
        }
      }
    });

    // v7: rewind events surface a synthetic stutter so the stutter-tag can label them
    let evStutters = ev.stutters || [];
    if (ev.kind === 'rewind') {
      evStutters = [{
        type: 'rewind',
        letter: (ev.target || '')[0] || '',
        intensity: (ev.attempts || []).length,
      }];
    }
    wordSpans.push({
      eventIdx: evIdx,
      stutters: evStutters,
      kind: ev.kind || 'word',
      startT: eventStart,
      endT: t,
    });

    if (ev.kind === 'ghost') t += TIMING.ghostFadeOut;
  });

  let totalDur = t;
  if (isAbsolute) {
    const byEv = {};
    for (let i = 0; i < schedule.length; i++) {
      const s = schedule[i];
      (byEv[s.evIdx] ||= []).push(i);
    }
    const evIds = Object.keys(byEv).map(Number).sort((a, b) => a - b);
    for (const evIdx of evIds) {
      const ev = utt.events[evIdx];
      if (!ev || ev.kind === 'rewind') continue;
      const idxs = byEv[evIdx];
      const skip = idxs.some((si) => {
        const x = schedule[si];
        return x.isRewindAttempt || x.isRewindFinal || x.isBridgeProlong;
      });
      if (skip) continue;

      const t0 = ev.startMs != null ? ev.startMs - utteranceStartMs : schedule[idxs[0]].appearAt;
      let t1;
      if (uttIdx != null && cueChainNextAbs.has(`${uttIdx},${evIdx}`)) {
        const nextAbs = cueChainNextAbs.get(`${uttIdx},${evIdx}`);
        t1 = nextAbs - utteranceStartMs;
      } else {
        const nextEv = utt.events[evIdx + 1];
        if (nextEv && nextEv.startMs != null) {
          t1 = nextEv.startMs - utteranceStartMs;
        } else {
          const lastAppear = Math.max(...idxs.map((si) => schedule[si].appearAt));
          t1 = lastAppear + Math.max(TIMING.charTime * 2, 80);
        }
      }
      if (t1 <= t0) t1 = t0 + 80;
      const n = idxs.length;
      idxs.forEach((si, j) => {
        schedule[si].appearAt = t0 + (n <= 1 ? 0 : (j / (n - 1)) * (t1 - t0 - 8));
      });
      const ws = wordSpans[evIdx];
      if (ws) {
        ws.startT = t0;
        ws.endT = t1;
      }
    }
    let maxT = 0;
    for (const s of schedule) {
      let end = s.appearAt;
      if (s.animatesProl) {
        if (s.isBridgeProlong && s.holdUntilMsAbs != null && utteranceStartMs != null) {
          end = Math.max(end, s.holdUntilMsAbs - utteranceStartMs);
        } else {
          end += (s.prolongIntensity || 0) * TIMING.prolongHoldPerDash;
        }
      }
      const step = s.isRewindAttempt ? TIMING.rewindAttemptCharTime : TIMING.charTime;
      end += step;
      if (end > maxT) maxT = end;
    }
    if (utt.events.some((e) => e.kind === 'ghost')) {
      maxT += TIMING.ghostFadeOut;
    }
    totalDur = maxT;
  }

  return { schedule, wordSpans, totalDuration: totalDur };
}

/* =========================================================================
   RENDER UTTERANCE — build DOM around the schedule
   ========================================================================= */

function renderUtterance(utt) {
  const stage = document.getElementById('utterance');
  if (!stage) return;
  stage.innerHTML = '';

  const sched = buildUtteranceSchedule(utt, undefined);
  // v7: when any event in the utterance has absolute startMs, the schedule's
  // appearAt values are already audio-time relative — skip the proportional
  // scaling in renderAtTime so the typewriter snaps to the cue points.
  sched.isAbsolute = utt.events.some(e => e.startMs != null);

  let curEvIdx = -1;
  let curWordEl = null;

  sched.schedule.forEach((s, i) => {
    if (s.evIdx !== curEvIdx) {
      if (curEvIdx !== -1) {
        const space = document.createElement('span');
        space.className = 'space-unit';
        stage.appendChild(space);
      }
      curEvIdx = s.evIdx;
      const ev = utt.events[curEvIdx];
      curWordEl = document.createElement('span');
      curWordEl.className = 'word-unit';
      if (ev.kind === 'ghost') curWordEl.classList.add('ghost');
      if (ev.kind === 'filler') curWordEl.classList.add('filler');
      if (ev.kind === 'rewind') curWordEl.classList.add('rewind');
      stage.appendChild(curWordEl);
      sched.wordSpans[curEvIdx].el = curWordEl;
    }
    const span = document.createElement('span');
    span.className = 'letter';
    if (s.isRewindAttempt) {
      span.classList.add('rewind-attempt');
      // Stagger erase delay: last-typed letter erases first (true "rewind").
      // delay = (count - 1 - idx) * 30ms so each letter "un-types" in reverse.
      const total = s.attemptCharCount || 1;
      const idxInAttempt = s.attemptCharIdx || 0;
      const delay = Math.max(0, (total - 1 - idxInAttempt) * 30);
      span.style.transitionDelay = `${delay}ms, ${delay}ms`;
    }
    span.textContent = s.char;
    span.style.fontVariationSettings = `"PROL" 0, "STTR" 0`;
    curWordEl.appendChild(span);
    s.el = span;
  });

  return sched;
}

const BUNDLED_AUDIO_SRC = 'try1mp3.mp3';

let filmWordEls = [];
let filmWordsMeta = [];
let filmSilenceSpans = [];
let csvSilenceGaps = [];
let currentFilmWordIdx = -1;
let inSilenceGap = false;
let currentGapEl = null;
/** Smoothed horizontal pan (px); null after rebuild — re-synced from strip on first center call. */
let filmStripPanSmoothed = null;
/** Next marker time (ms) after each anchored event — typing fills until this instant. */
let cueChainNextAbs = new Map();
let cueSortedStarts = [];

function rebuildCueChain() {
  cueChainNextAbs = new Map();
  cueSortedStarts = [];
  if (TIMELINE_SOURCE !== 'csv') return;
  const list = [];
  for (let ui = 0; ui < TIMELINE.length; ui++) {
    TIMELINE[ui].events.forEach((ev, ej) => {
      if (ev.startMs != null && !Number.isNaN(ev.startMs)) {
        list.push({ ui, ej, t: ev.startMs });
      }
    });
  }
  list.sort((a, b) => (a.t - b.t) || (a.ui - b.ui) || (a.ej - b.ej));
  const boundaries = new Set(list.map((x) => x.t));
  for (const s of csvSilenceGaps || []) {
    if (s.startMs != null && !Number.isNaN(s.startMs)) boundaries.add(s.startMs);
  }
  const sortedBounds = [...boundaries].sort((a, b) => a - b);
  cueSortedStarts = sortedBounds;
  const audioEnd = audio.duration && isFinite(audio.duration) ? audio.duration * 1000 : null;
  const fallbackEnd = sortedBounds.length ? sortedBounds[sortedBounds.length - 1] + 800 : 0;
  const chainEnd = audioEnd != null && audioEnd > 0 ? audioEnd : fallbackEnd;
  function nextBoundaryAfter(t0) {
    for (let k = 0; k < sortedBounds.length; k++) {
      if (sortedBounds[k] > t0) return sortedBounds[k];
    }
    return chainEnd;
  }
  for (let i = 0; i < list.length; i++) {
    const boundary = nextBoundaryAfter(list[i].t);
    cueChainNextAbs.set(`${list[i].ui},${list[i].ej}`, boundary);
  }
}

function rebuildFilmStrip() {
  const strip = document.getElementById('filmStrip');
  if (!strip) return;
  strip.innerHTML = '';
  filmWordEls = [];
  filmWordsMeta = [];
  filmSilenceSpans = [];
  currentFilmWordIdx = -1;
  inSilenceGap = false;
  currentGapEl = null;
  strip.style.transform = '';
  strip.style.transition = 'none';
  filmStripPanSmoothed = null;

  const uttStartAbs = (utt) => minAnchoredStartMs(utt);

  for (let ui = 0; ui < TIMELINE.length; ui++) {
    if (ui > 0 && TIMELINE_SOURCE !== 'csv') {
      const br = document.createElement('span');
      br.className = 'film-utt-break';
      br.setAttribute('aria-hidden', 'true');
      strip.appendChild(br);
    }
    const utt = TIMELINE[ui];
    const utBase = utteranceStarts[ui] || 0;
    const sched = buildUtteranceSchedule(utt, ui);
    const utAbs = uttStartAbs(utt);

    let curEvIdx = -1;
    let curWordEl = null;
    let meta = null;

    sched.schedule.forEach((s) => {
      if (s.evIdx !== curEvIdx) {
        curEvIdx = s.evIdx;
        const ev = utt.events[curEvIdx];
        curWordEl = document.createElement('span');
        curWordEl.className = 'film-word';
        curWordEl.setAttribute('dir', 'rtl');
        curWordEl.setAttribute('lang', 'he');
        if (ev.kind === 'ghost') curWordEl.classList.add('ghost');
        if (ev.kind === 'filler') curWordEl.classList.add('filler');
        if (ev.kind === 'rewind') curWordEl.classList.add('rewind');
        strip.appendChild(curWordEl);
        filmWordEls.push(curWordEl);

        const ws = sched.wordSpans[curEvIdx];
        const absStart = ev.startMs != null ? ev.startMs : utBase + ws.startT;
        let absEnd = cueChainNextAbs.get(`${ui},${curEvIdx}`);
        if (absEnd == null || !(absEnd > absStart)) {
          const nextEv = utt.events[curEvIdx + 1];
          absEnd = nextEv && nextEv.startMs != null
            ? nextEv.startMs
            : (ui + 1 < TIMELINE.length ? utteranceStarts[ui + 1] : totalDuration);
        }
        if (!(absEnd > absStart)) absEnd = absStart + 200;

        meta = {
          el: curWordEl,
          uttIdx: ui,
          evIdx: curEvIdx,
          absStart,
          absEnd,
          stutters: ws.stutters,
          kind: ev.kind || 'word',
          wordSpan: ws,
          ev,
          utBase,
          utStartAbs: utAbs,
          letters: [],
        };
        filmWordsMeta.push(meta);
      }
      const span = document.createElement('span');
      span.className = 'letter';
      if (s.isRewindAttempt) {
        span.classList.add('rewind-attempt');
        const total = s.attemptCharCount || 1;
        const idxInAttempt = s.attemptCharIdx || 0;
        const delay = Math.max(0, (total - 1 - idxInAttempt) * 30);
        span.style.transitionDelay = `${delay}ms, ${delay}ms`;
      }
      span.textContent = s.char;
      span.style.fontVariationSettings = `"PROL" 0, "STTR" 0`;
      if (s.animatesProl) span.classList.add('prolong-axis');
      curWordEl.appendChild(span);
      meta.letters.push({
        el: span,
        s,
        absAppearAt: utBase + s.appearAt,
      });
    });
  }

  if (csvSilenceGaps.length && filmWordsMeta.length >= 2) {
    const placed = new Set();
    const sortedGaps = csvSilenceGaps.slice().sort((a, b) => a.startMs - b.startMs);
    for (const S of sortedGaps) {
      if (placed.has(S.startMs)) continue;
      for (let j = 1; j < filmWordsMeta.length; j++) {
        const prev = filmWordsMeta[j - 1];
        const cur = filmWordsMeta[j];
        // Word absEnd often equals cur.absStart (next cue); silence sits *between* start times.
        if (S.startMs > prev.absStart - 80 && S.endMs <= cur.absStart + 80 && S.startMs < cur.absStart) {
          const dur = Math.max(0, S.endMs - S.startMs);
          const gap = document.createElement('span');
          gap.className = 'film-gap';
          gap.setAttribute('role', 'img');
          gap.setAttribute('aria-label', 'שקט');
          const wPx = Math.min(520, Math.max(36, dur * 0.034));
          gap.style.width = wPx + 'px';
          let insertRef = cur.el;
          if (TIMELINE_SOURCE !== 'csv') {
            const ps = cur.el.previousElementSibling;
            if (ps && ps.classList && ps.classList.contains('film-utt-break')) insertRef = ps;
          }
          strip.insertBefore(gap, insertRef);
          filmSilenceSpans.push({ el: gap, absStart: S.startMs, absEnd: S.endMs });
          placed.add(S.startMs);
          break;
        }
      }
    }
  }
}

function findActiveFilmWordIdx(t) {
  if (!filmWordsMeta.length) return -1;
  for (let i = filmWordsMeta.length - 1; i >= 0; i--) {
    if (t >= filmWordsMeta[i].absStart) return i;
  }
  return 0;
}

function getStripTranslateX(strip) {
  const st = strip.style.transform;
  if (st && st !== 'none') {
    const m = st.match(/translateX\(([-0-9.eE]+)px\)/);
    if (m) return parseFloat(m[1], 10);
  }
  const cs = getComputedStyle(strip).transform;
  if (!cs || cs === 'none') return 0;
  const mm = cs.match(/matrix(?:3d)?\(([^)]+)\)/);
  if (!mm) return 0;
  const parts = mm[1].split(',').map((x) => parseFloat(x.trim(), 10));
  return parts.length === 6 ? parts[4] : (parts.length === 16 ? parts[12] : 0);
}

/** Smoothstep-style ease for PROL ramps (normal → elongated). */
function easeInOutCubic(t) {
  const x = Math.max(0, Math.min(1, t));
  return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
}

/**
 * Keep `el` under #stage horizontal center. While playing, ease the strip (film-strip drift);
 * when paused or scrubbing, snap so the frame matches the timeline.
 */
function centerFilmStripElement(el) {
  const strip = document.getElementById('filmStrip');
  const stage = document.getElementById('stage');
  if (!strip || !el || !stage) return;
  strip.style.transition = 'none';
  const stageRect = stage.getBoundingClientRect();
  const centerX = stageRect.left + stageRect.width / 2;
  const instant = !playing;
  if (filmStripPanSmoothed == null) filmStripPanSmoothed = getStripTranslateX(strip);
  strip.style.transform = `translateX(${filmStripPanSmoothed}px)`;
  const elRect = el.getBoundingClientRect();
  const elCenterX = elRect.left + elRect.width / 2;
  const adjust = centerX - elCenterX;
  const target = filmStripPanSmoothed + adjust;
  if (instant) {
    filmStripPanSmoothed = target;
  } else {
    const err = Math.abs(adjust);
    /* Ease-in-out feel: gentle when nearly centered, stronger when a new word jumps layout */
    const alpha = Math.min(0.72, 0.1 + err * 0.0014);
    filmStripPanSmoothed += (target - filmStripPanSmoothed) * alpha;
  }
  strip.style.transform = `translateX(${filmStripPanSmoothed}px)`;
}

function highlightFilmWord(idx) {
  filmSilenceSpans.forEach(g => g.el.classList.remove('active'));
  filmWordEls.forEach((el, i) => {
    el.classList.remove('active', 'near1', 'near2', 'far');
    if (idx < 0 || idx >= filmWordEls.length) {
      el.classList.add('far');
      return;
    }
    const dist = Math.abs(i - idx);
    if (i === idx) el.classList.add('active');
    else if (dist <= 2) el.classList.add('near1');
    else if (dist <= 5) el.classList.add('near2');
    else el.classList.add('far');
  });
}

/* =========================================================================
   ANCHORS, AUDIO, PLAYER STATE — same approach as v3
   ========================================================================= */

const ANCHOR_KEY = 'megamgem_anchors_v5';
let anchors = {};
function loadAnchors() {
  try { anchors = JSON.parse(localStorage.getItem(ANCHOR_KEY) || '{}'); } catch(e) { anchors = {}; }
  updateAnchorCount();
}
function saveAnchors() { localStorage.setItem(ANCHOR_KEY, JSON.stringify(anchors)); updateAnchorCount(); }
function updateAnchorCount() {
  const el = document.getElementById('anchorCount');
  if (!el) return;
  const n = Object.keys(anchors).length;
  el.textContent = n > 0 ? `${n} anchors set` : 'no anchors yet';
  paintMarkers();
}

function utteranceDuration(utt, uttIdx) {
  const sched = buildUtteranceSchedule(utt, uttIdx);
  return sched.totalDuration;
}

function computeUtteranceStarts(audioMs) {
  const N = TIMELINE.length;
  const starts = new Array(N).fill(null);

  // v7: CSV-derived startMs takes priority. For each utterance, if any event
  // has an absolute startMs, the utterance start IS that event's start.
  const csvDerived = {};
  for (let i = 0; i < N; i++) {
    const utt = TIMELINE[i];
    const t0 = minAnchoredStartMs(utt);
    if (t0 != null) {
      starts[i] = t0;
      csvDerived[i] = true;
    }
  }
  // Manually-placed anchors fill any remaining gaps.
  Object.keys(anchors).forEach(k => {
    const idx = parseInt(k);
    if (idx >= 0 && idx < N && starts[idx] == null) starts[idx] = anchors[k];
  });
  // Build the sorted index list of all known starts (CSV + manual).
  const anchorIdxs = [];
  for (let i = 0; i < N; i++) if (starts[i] != null) anchorIdxs.push(i);
  if (anchorIdxs.length === 0) {
    if (audioMs && audioMs > 0) {
      const counts = TIMELINE.map(u => {
        let c = 0; u.events.forEach(e => c += (e.target || e.text || '').length); return Math.max(c, 1);
      });
      const total = counts.reduce((a,b) => a+b, 0);
      let cum = 0;
      for (let i = 0; i < N; i++) { starts[i] = (cum / total) * audioMs; cum += counts[i]; }
    } else {
      let cum = 0;
      for (let i = 0; i < N; i++) { starts[i] = cum; cum += utteranceDuration(TIMELINE[i], i) + TIMING.endOfUtterance; }
    }
    return starts;
  }
  if (starts[anchorIdxs[0]] != null && anchorIdxs[0] > 0) {
    let t = starts[anchorIdxs[0]];
    for (let i = anchorIdxs[0] - 1; i >= 0; i--) {
      const dur = utteranceDuration(TIMELINE[i], i) + TIMING.endOfUtterance;
      t -= dur; starts[i] = Math.max(0, t);
    }
  }
  for (let a = 0; a < anchorIdxs.length - 1; a++) {
    const i1 = anchorIdxs[a], i2 = anchorIdxs[a+1];
    if (i2 - i1 <= 1) continue;
    const t1 = starts[i1], t2 = starts[i2];
    const charSum = []; let total = 0;
    for (let i = i1; i < i2; i++) {
      let c = 0; TIMELINE[i].events.forEach(e => c += (e.target || e.text || '').length);
      c = Math.max(c, 1); charSum.push(c); total += c;
    }
    let cum = 0;
    for (let i = i1; i < i2; i++) { starts[i] = t1 + (cum / total) * (t2 - t1); cum += charSum[i - i1]; }
  }
  const lastIdx = anchorIdxs[anchorIdxs.length - 1];
  if (lastIdx < N - 1) {
    let t = starts[lastIdx];
    let pace = TIMING.charTime;
    if (audioMs) {
      let chars = 0;
      for (let i = lastIdx; i < N; i++) TIMELINE[i].events.forEach(e => chars += (e.target || e.text || '').length);
      pace = Math.max(50, (audioMs - t) / Math.max(chars, 1));
    }
    for (let i = lastIdx + 1; i < N; i++) {
      let chars = 0; TIMELINE[i-1].events.forEach(e => chars += (e.target || e.text || '').length);
      t += chars * pace + TIMING.endOfUtterance; starts[i] = t;
    }
  }
  return starts;
}

let utteranceStarts = [];
let totalDuration = 0;
let playing = false;
let audioLoaded = false;
let speed = 1.0;
let baseTime = 0;
let pauseAccum = 0;

const audio = document.getElementById('audio');
const stutterTag = document.getElementById('stutterTag');
const elapsedEl = document.getElementById('elapsed');
const timelineProgress = document.getElementById('timelineProgress');
const timelineEvents = document.getElementById('timelineEvents');
const timecode = document.getElementById('timecode');

function rebuildTiming() {
  const audioDur = audio.duration ? audio.duration * 1000 : null;
  rebuildCueChain();
  utteranceStarts = computeUtteranceStarts(audioDur);
  if (audioDur) totalDuration = audioDur;
  else totalDuration = utteranceStarts[utteranceStarts.length - 1] +
                       utteranceDuration(TIMELINE[TIMELINE.length - 1], TIMELINE.length - 1);
  paintMarkers();
  rebuildFilmStrip();
}
function paintMarkers() {
  if (!totalDuration) return;
  timelineEvents.innerHTML = '';
  if (TIMELINE_SOURCE === 'csv' && cueSortedStarts.length) {
    cueSortedStarts.forEach((t) => {
      const m = document.createElement('div');
      m.className = 'marker';
      m.style.left = (t / totalDuration * 100) + '%';
      timelineEvents.appendChild(m);
    });
    return;
  }
  utteranceStarts.forEach((t) => {
    const m = document.createElement('div');
    m.className = 'marker';
    m.style.left = (t / totalDuration * 100) + '%';
    timelineEvents.appendChild(m);
  });
}

function getCurrentTime() {
  if (audioLoaded) return audio.currentTime * 1000;
  return performance.now() - baseTime;
}

function renderAtTime(t) {
  if (!filmWordsMeta.length) {
    timelineProgress.style.width = '0%';
    return;
  }

  const gapNow = filmSilenceSpans.find(g => t >= g.absStart && t < g.absEnd);
  if (gapNow) {
    const needRecenter = !inSilenceGap || currentGapEl !== gapNow.el;
    inSilenceGap = true;
    currentGapEl = gapNow.el;
    currentFilmWordIdx = -1;
    if (needRecenter) {
      highlightFilmWord(-1);
      gapNow.el.classList.add('active');
    }
    findActiveFilmWordIdx(t);
  } else {
    if (inSilenceGap) {
      inSilenceGap = false;
      currentGapEl = null;
      filmSilenceSpans.forEach(g => g.el.classList.remove('active'));
    }
    const widx = findActiveFilmWordIdx(t);
    if (widx !== currentFilmWordIdx) {
      currentFilmWordIdx = widx;
      highlightFilmWord(widx);
    }
  }

  filmWordsMeta.forEach((meta) => {
    meta.letters.forEach(({ el, s, absAppearAt }) => {
      if (t >= absAppearAt) {
        if (!el.classList.contains('visible')) el.classList.add('visible');
        if (s.isRewindAttempt && s.attemptEraseAtAbs != null) {
          if (t >= s.attemptEraseAtAbs) el.classList.add('erasing');
          else el.classList.remove('erasing');
        }
        if (s.animatesProl) {
          let absProlEnd = meta.absEnd;
          if (s.isBridgeProlong && s.holdUntilMsAbs != null) {
            absProlEnd = s.holdUntilMsAbs;
          }
          const rampDur = Math.max(40, absProlEnd - absAppearAt);
          const sinceAppear = t - absAppearAt;
          let prol = 0;
          if (sinceAppear <= 0) prol = 0;
          else if (sinceAppear >= rampDur) prol = 1000;
          else prol = easeInOutCubic(sinceAppear / rampDur) * 1000;
          el.style.fontVariationSettings = `"PROL" ${Math.round(prol)}, "STTR" 0`;
        } else {
          el.style.fontVariationSettings = `"PROL" ${s.prol}, "STTR" ${s.sttr}`;
        }
      } else {
        el.classList.remove('visible');
        el.classList.remove('erasing');
      }
    });
  });

  filmWordsMeta.forEach((meta) => {
    const ev = meta.ev;
    const ws = meta.wordSpan;
    if (!meta.el) return;
    if (ev.kind === 'ghost') {
      const utBase = meta.utBase;
      const struckTime = utBase + ws.endT;
      if (t > struckTime) {
        meta.el.classList.add('struck');
        const since = t - struckTime;
        if (since > 100) {
          const fadeT = Math.min(1, (since - 100) / TIMING.ghostFadeOut);
          meta.el.style.opacity = 1 - fadeT * 0.7;
        }
      } else {
        meta.el.classList.remove('struck');
        meta.el.style.opacity = 1;
      }
    } else if (ev.kind === 'filler') {
      const utBase = meta.utBase;
      if (t > utBase + ws.endT + 200) meta.el.classList.add('faded');
      else meta.el.classList.remove('faded');
    }
  });

  let activeStutter = null;
  if (!gapNow) {
    filmWordsMeta.forEach((meta) => {
      if (meta.stutters && meta.stutters.length > 0 &&
          t >= meta.absStart && t < meta.absEnd) {
        activeStutter = meta.stutters[0];
      }
    });
  }
  if (activeStutter) {
    const labelMap = {
      prolong: 'PROLONG',
      'prolong-bridge': 'PROLONG-BRIDGE',
      repeat: 'REPEAT',
      'repeat-dash': 'REPEAT-DASH',
      mixed: 'MIXED',
      rewind: 'REWIND',
    };
    let intensity = activeStutter.intensity;
    if (activeStutter.type === 'mixed') {
      intensity = `${activeStutter.repeat_count}+${activeStutter.prolong_intensity}`;
    }
    stutterTag.innerHTML = `<b>${labelMap[activeStutter.type] || activeStutter.type.toUpperCase()}</b> · ${activeStutter.letter} · ×${intensity}`;
    stutterTag.style.opacity = 1;
  } else {
    stutterTag.style.opacity = 0;
  }

  /* After letter visibility / layout — keep active word or silence bar on stage center (matches film-strip.html). */
  if (gapNow && gapNow.el) {
    centerFilmStripElement(gapNow.el);
  } else if (currentFilmWordIdx >= 0 && filmWordEls[currentFilmWordIdx]) {
    centerFilmStripElement(filmWordEls[currentFilmWordIdx]);
  }

  timelineProgress.style.width = totalDuration > 0 ? (t / totalDuration * 100) + '%' : '0%';
  elapsedEl.textContent = `${formatTime(t)} / ${formatTime(totalDuration)}`;
  timecode.innerHTML = `<b>${formatTime(t)}</b> / ${formatTime(totalDuration)}`;
}

function tick() {
  if (!playing) return;
  const t = getCurrentTime();
  if (t >= totalDuration) { pause(); return; }
  renderAtTime(t);
  requestAnimationFrame(tick);
}
function play() {
  playing = true;
  if (audioLoaded) { audio.playbackRate = speed; audio.play().catch(()=>{}); }
  else baseTime = performance.now() - pauseAccum;
  tick();
}
function pause() {
  playing = false;
  if (audioLoaded) audio.pause();
  else pauseAccum = performance.now() - baseTime;
}

document.getElementById('stage').addEventListener('click', () => { playing ? pause() : play(); });

document.getElementById('timeline').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const t = x * totalDuration;
  if (audioLoaded) audio.currentTime = t / 1000;
  else { baseTime = performance.now() - t; pauseAccum = t; }
  renderAtTime(t);
});

const audioZone = document.getElementById('audioZone');
const audioInput = document.getElementById('audioInput');
const audioZoneLabel = document.getElementById('audioZoneLabel');

function loadAudio(file) {
  audio.src = URL.createObjectURL(file);
  audio.addEventListener('loadedmetadata', () => {
    audioLoaded = true;
    if (audioZone) audioZone.classList.add('has-audio');
    if (audioZoneLabel) audioZoneLabel.textContent = `Loaded: ${file.name} · ${formatTime(audio.duration*1000)}`;
    rebuildTiming(); renderAtTime(0);
  }, { once: true });
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault(); playing ? pause() : play();
    return;
  }
  const t0 = getCurrentTime();
  if (e.code === 'ArrowRight') {
    e.preventDefault();
    if (TIMELINE_SOURCE === 'csv' && cueSortedStarts.length) {
      const nxt = cueSortedStarts.find((st) => st > t0 + 15);
      if (nxt != null) {
        if (audioLoaded) audio.currentTime = nxt / 1000;
        else { baseTime = performance.now() - nxt; pauseAccum = nxt; }
        renderAtTime(nxt);
      }
    } else if (filmWordsMeta.length) {
      const fi = Math.max(0, findActiveFilmWordIdx(t0));
      const uidx = filmWordsMeta[fi].uttIdx;
      if (uidx < TIMELINE.length - 1) {
        const nt = utteranceStarts[uidx + 1];
        if (audioLoaded) audio.currentTime = nt / 1000;
        else { baseTime = performance.now() - nt; pauseAccum = nt; }
        renderAtTime(nt);
      }
    }
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    if (TIMELINE_SOURCE === 'csv' && cueSortedStarts.length) {
      let prv = null;
      for (let i = cueSortedStarts.length - 1; i >= 0; i--) {
        if (cueSortedStarts[i] < t0 - 15) { prv = cueSortedStarts[i]; break; }
      }
      if (prv != null) {
        if (audioLoaded) audio.currentTime = prv / 1000;
        else { baseTime = performance.now() - prv; pauseAccum = prv; }
        renderAtTime(prv);
      }
    } else if (filmWordsMeta.length) {
      const fi = Math.max(0, findActiveFilmWordIdx(t0));
      const uidx = filmWordsMeta[fi].uttIdx;
      if (uidx > 0) {
        const pt = utteranceStarts[uidx - 1];
        if (audioLoaded) audio.currentTime = pt / 1000;
        else { baseTime = performance.now() - pt; pauseAccum = pt; }
        renderAtTime(pt);
      }
    }
  }
});

/* v7: Audition CSV import — parse, classify, align, install. */
function setCSVStatus(msg) {
  const el = document.getElementById('csvStatus');
  if (el) el.textContent = msg || '';
}

function applyCSVTimeline(timelineV3, info) {
  TIMELINE = timelineV3;
  TIMELINE_SOURCE = 'csv';
  csvSilenceGaps = (info && info.silences) ? info.silences.slice() : [];
  currentFilmWordIdx = -1;
  rebuildTiming();
  renderAtTime(getCurrentTime());
}

function formatTime(ms) {
  if (!ms || ms < 0) ms = 0;
  const s = Math.floor(ms / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function tryLoadBundledAudio() {
  let metaApplied = false;
  const onMeta = () => {
    if (metaApplied) return;
    if (audio.error) return;
    metaApplied = true;
    audioLoaded = true;
    if (audioZone) audioZone.classList.add('has-audio');
    rebuildTiming();
    renderAtTime((audio.currentTime || 0) * 1000);
  };
  audio.addEventListener('loadedmetadata', onMeta, { once: true });
  audio.addEventListener('error', () => {
    audioLoaded = false;
    if (audioZone) audioZone.classList.remove('has-audio');
    rebuildTiming();
    renderAtTime(0);
  }, { once: true });
  if (!audio.src || !audio.src.includes('try1mp3')) {
    audio.src = BUNDLED_AUDIO_SRC;
  }
  audio.load();
  if (audio.readyState >= 1 && !audio.error) onMeta();
}

async function bootBundledCsvThenPlayer() {
  let csvOk = false;
  try {
    const r = await fetch('Markers01.csv');
    if (!r.ok) throw new Error(String(r.status));
    const result = importAuditionCSV(await r.text());
    applyCSVTimeline(result.timeline, {
      tokens: result.tokens.length,
      events: result.events.length,
      silences: result.silences || [],
      autoLoaded: true,
    });
    csvOk = true;
  } catch (err) {
    console.warn('Bundled Markers01.csv:', err);
    setCSVStatus('Import Markers01.csv manually (fetch blocked or file missing)');
  }
  // Never paint the v2-only strip first (it drops Audition-only cues like אה---ה and silences);
  // only fall back to inline transcript timing if CSV is unavailable.
  if (!csvOk) {
    rebuildTiming();
    renderAtTime(0);
  }
  tryLoadBundledAudio();
}

loadAnchors();
bootBundledCsvThenPlayer();
</script>
