<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>נקמת הילד הגמגם — Typewriter v6</title>
<style>
  :root {
    --paper: #F1ECE0;
    --ink: #0E0D0C;
    --rust: #C13F1F;
    --paper-dim: rgba(241, 236, 224, 0.45);
    --paper-faint: rgba(241, 236, 224, 0.12);
    --mono: ui-monospace, 'JetBrains Mono', 'Menlo', monospace;
    --hebrew: 'MegamgemSans', 'Frank Ruhl Libre', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--ink); color: var(--paper); font-family: var(--mono); overflow: hidden; user-select: none; -webkit-font-smoothing: antialiased; }
  .app { height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }

  header {
    padding: 18px 32px; border-bottom: 1px solid var(--paper-faint);
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--paper-dim); direction: ltr;
  }
  header .ctr { text-align: center; }
  header .right { text-align: right; font-variant-numeric: tabular-nums; }
  header b { color: var(--paper); font-weight: 500; }

  .stage {
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 60px 80px;
  }
  .utterance {
    font-family: var(--hebrew);
    font-size: clamp(38px, 5.2vw, 78px);
    line-height: 1.4;
    letter-spacing: -0.005em;
    color: var(--paper);
    direction: rtl; unicode-bidi: isolate;
    text-align: center;
    max-width: 1500px;
  }
  .word-unit {
    display: inline-block;
    /* margins added programmatically by space-units */
  }
  .space-unit {
    display: inline-block;
    width: 0.32em;
  }
  .letter {
    display: inline-block;
    opacity: 0;
    /* axis values set inline */
  }
  .letter.visible { opacity: 1; }
  .letter.fading-prol {
    /* applied while PROL is ramping */
    transition: font-variation-settings 50ms linear;
  }
  .word-unit.ghost .letter {
    color: var(--paper-dim);
  }
  .word-unit.ghost.struck .letter {
    text-decoration: line-through;
    text-decoration-color: var(--rust);
    text-decoration-thickness: 2px;
    transition: text-decoration-color 200ms ease;
  }

  .stutter-tag {
    position: absolute; bottom: 28px; left: 0; right: 0; text-align: center;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
    color: var(--paper-dim); text-transform: uppercase; direction: ltr;
    transition: opacity 200ms ease;
  }
  .stutter-tag b { color: var(--rust); font-weight: 500; }

  footer {
    padding: 16px 32px 22px; border-top: 1px solid var(--paper-faint);
    display: grid; grid-template-columns: auto 1fr auto auto; gap: 18px;
    align-items: center;
  }
  .btn {
    background: transparent; color: var(--paper);
    border: 1px solid var(--paper); padding: 8px 16px;
    font-family: inherit; font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; cursor: pointer; transition: all 150ms ease; white-space: nowrap;
  }
  .btn:hover { background: var(--paper); color: var(--ink); }
  .btn.primary { background: var(--paper); color: var(--ink); }
  .btn.primary:hover { background: var(--rust); color: var(--paper); border-color: var(--rust); }
  .btn.ghost { border-color: var(--paper-faint); color: var(--paper-dim); }
  .btn.ghost:hover { background: var(--paper-faint); color: var(--paper); }

  .timeline { height: 4px; background: var(--paper-faint); position: relative; cursor: pointer; }
  .timeline-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--rust); width: 0%; }
  .timeline-events { position: absolute; top: -3px; height: 10px; width: 100%; pointer-events: none; }
  .marker { position: absolute; top: 50%; transform: translateY(-50%); width: 1px; height: 4px; background: var(--paper-dim); }
  .marker.anchor { width: 2px; height: 10px; background: var(--rust); top: 0; transform: none; }

  .timecode { font-size: 11px; color: var(--paper-dim); font-variant-numeric: tabular-nums; letter-spacing: 0.06em; min-width: 130px; text-align: right; }
  .timecode b { color: var(--paper); font-weight: 500; }

  .speed { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--paper-dim); text-transform: uppercase; letter-spacing: 0.1em; }
  .speed input { width: 70px; accent-color: var(--rust); }

  .audio-zone {
    grid-column: 1 / -1; margin-top: 10px; border: 1px dashed var(--paper-faint);
    padding: 10px 14px; text-align: center; font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--paper-dim); cursor: pointer; transition: all 150ms ease;
  }
  .audio-zone.has-audio { color: var(--paper); border-style: solid; }
  .audio-zone.dragover { border-color: var(--rust); color: var(--rust); }

  .anchor-info {
    grid-column: 1 / -1; text-align: center; font-size: 10px;
    color: var(--paper-dim); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .anchor-info b { color: var(--rust); }
  .anchor-info kbd { display: inline-block; padding: 1px 6px; border: 1px solid var(--paper-faint); border-radius: 3px; font-family: var(--mono); color: var(--paper); margin: 0 4px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="left">Megamgem<b>Sans</b> · Typewriter · v6 · 40% slower</div>
    <div class="ctr"><b id="utteranceCounter">00 / 41</b></div>
    <div class="right" id="elapsed">00:00 / 00:00</div>
  </header>

  <div class="stage" id="stage">
    <div class="utterance" id="utterance" dir="rtl"></div>
    <div class="stutter-tag" id="stutterTag"></div>
  </div>

  <footer>
    <button class="btn primary" id="playBtn">▶ Play</button>
    <div class="timeline" id="timeline">
      <div class="timeline-events" id="timelineEvents"></div>
      <div class="timeline-progress" id="timelineProgress"></div>
    </div>
    <div class="speed">
      <span>Speed</span>
      <input type="range" id="speedSlider" min="0.4" max="1.8" step="0.05" value="1.0">
      <span id="speedValue">1.0×</span>
    </div>
    <div class="timecode" id="timecode"><b>00:00</b> / 00:00</div>
    <label class="audio-zone" id="audioZone">
      <span id="audioZoneLabel">Drop audio file here, or click to load</span>
      <input type="file" id="audioInput" accept="audio/*" hidden>
    </label>
    <div class="anchor-info">
      <b>SYNC:</b> press <kbd>A</kbd> at the start of each utterance ·
      <button class="btn ghost" id="clearAnchors" style="padding:4px 10px;font-size:10px">Clear</button> ·
      <button class="btn ghost" id="importAnchors" style="padding:4px 10px;font-size:10px">Import</button> ·
      <input type="file" id="importAnchorsInput" accept=".json" hidden>
      <button class="btn ghost" id="exportAnchors" style="padding:4px 10px;font-size:10px">Export</button>
      <span id="anchorCount" style="margin-inline-start:12px;color:var(--rust)"></span>
    </div>
  </footer>
</div>

<audio id="audio" preload="auto"></audio>

<script>
const TIMELINE = JSON.parse(document.getElementById('timelineData').textContent);

/* =========================================================================
   TYPING TIMING — every letter is a typewriter keystroke
   ========================================================================= */
const TIMING = {
  // v6: slowed by 40% (each value × 1.67)
  charTime: 125,            // ms between consecutive letters (the typewriter pace)
  spaceTime: 184,           // pause for a space
  stutterCharTime: 108,     // slightly faster within a rapid-fire stutter
  dashStutterCharTime: 234, // slower within dash-stutter
  prolongHoldPerDash: 334,  // ms held while PROL ramps before next letter
  ghostFadeOut: 467,        // ghost fades after appearing (with strikethrough)
  endOfUtterance: 1170,
};

/* =========================================================================
   BUILD A FLAT SEQUENCE OF (letter, axis values, when to appear)
   ========================================================================= */

function buildLetterFlowFor(event) {
  /* Returns flat array of letter-info objects (no timing yet).
     v5: handles multiple stutters per word and mixed type. */
  if (event.kind === 'ghost') {
    return Array.from(event.text).map(c => ({char: c, sttr: 0, prol: 0, ghost: true}));
  }
  const word = event.target;
  // v5: stutters is an ARRAY (was single 'stutter' before)
  const stutters = (event.stutters || []).slice().sort((a, b) => a.position - b.position);

  if (stutters.length === 0) {
    return Array.from(word).map(c => ({char: c, sttr: 0, prol: 0}));
  }

  // Walk through the target word, expanding each stuttered position into its sequence
  const arr = [];
  let pos = 0;
  for (const s of stutters) {
    // Plain prefix until this stutter's position
    while (pos < s.position) {
      arr.push({char: word[pos], sttr: 0, prol: 0});
      pos++;
    }

    if (s.type === 'prolong') {
      arr.push({
        char: word[pos],
        sttr: 0,
        prol: 1000,
        animatesProl: true,
        prolongIntensity: s.intensity,
      });
      pos++;
    } else if (s.type === 'repeat' || s.type === 'repeat-dash') {
      const N = s.intensity;
      for (let i = 0; i < N; i++) {
        const sttr = N <= 1 ? 0 : Math.round(1000 * (N - 1 - i) / (N - 1));
        arr.push({
          char: s.letter,
          sttr, prol: 0,
          isStutterCopy: i < N - 1,
          isDashStutter: s.type === 'repeat-dash',
        });
      }
      // Last stutter copy IS the resolved letter (at word[pos])
      pos++;
    } else if (s.type === 'mixed') {
      // Repetition that builds into a prolongation
      // Display: N copies of the letter, last one prolongs
      const N = s.repeat_count;
      for (let i = 0; i < N; i++) {
        const isLast = i === N - 1;
        const sttr = N <= 1 ? 0 : Math.round(1000 * (N - 1 - i) / (N - 1));
        arr.push({
          char: s.letter,
          sttr,
          prol: isLast ? 1000 : 0,
          animatesProl: isLast,
          prolongIntensity: isLast ? s.prolong_intensity : 0,
          isStutterCopy: !isLast,
          isMixed: true,
        });
      }
      pos++;
    }
  }

  // Plain suffix
  while (pos < word.length) {
    arr.push({char: word[pos], sttr: 0, prol: 0});
    pos++;
  }

  return arr;
}

function buildUtteranceSchedule(utt) {
  /* Returns: { schedule: [{el?, char, appearAt, sttr, prol, ...}],
                wordSpans: [{el, startT, endT, eventIdx}],
                totalDuration } */
  const schedule = [];
  const wordSpans = [];
  let t = 0;

  utt.events.forEach((ev, evIdx) => {
    if (evIdx > 0) t += TIMING.spaceTime; // pause between events (rendered as space-unit)

    const flow = buildLetterFlowFor(ev);
    const eventStart = t;

    // Decide per-character pace
    const isDashStutter = ev.stutter && ev.stutter.type === 'repeat-dash';
    const isRepeat = ev.stutter && (ev.stutter.type === 'repeat' || ev.stutter.type === 'repeat-dash');

    flow.forEach((letterInfo, idx) => {
      schedule.push({
        evIdx,
        char: letterInfo.char,
        appearAt: t,
        sttr: letterInfo.sttr,
        prol: letterInfo.prol,
        animatesProl: !!letterInfo.animatesProl,
        prolongIntensity: letterInfo.prolongIntensity || 0,
        ghost: !!letterInfo.ghost,
        isStutterCopy: !!letterInfo.isStutterCopy,
        isDashStutter: !!letterInfo.isDashStutter,
      });

      // Advance time
      let step = TIMING.charTime;
      if (isRepeat && letterInfo.isStutterCopy) {
        step = isDashStutter ? TIMING.dashStutterCharTime : TIMING.stutterCharTime;
      }
      t += step;

      // Prolongation hold: after the prolonged letter appears, wait for the PROL ramp
      if (letterInfo.animatesProl) {
        t += letterInfo.prolongIntensity * TIMING.prolongHoldPerDash;
      }
    });

    wordSpans.push({
      eventIdx: evIdx,
      stutters: ev.stutters || [],   // v5: array
      startT: eventStart,
      endT: t,
    });

    // Ghost fade-out: schedule a "strike" moment after ghost word completes
    if (ev.kind === 'ghost') {
      t += TIMING.ghostFadeOut;
    }
  });

  return { schedule, wordSpans, totalDuration: t };
}

/* =========================================================================
   RENDER UTTERANCE — build DOM around the schedule
   ========================================================================= */

function renderUtterance(utt) {
  const stage = document.getElementById('utterance');
  stage.innerHTML = '';

  const sched = buildUtteranceSchedule(utt);

  // Group letters by event (so each event = one word-unit, with its own block)
  let curEvIdx = -1;
  let curWordEl = null;

  sched.schedule.forEach((s, i) => {
    if (s.evIdx !== curEvIdx) {
      // start new word-unit
      if (curEvIdx !== -1) {
        // Add space between events
        const space = document.createElement('span');
        space.className = 'space-unit';
        stage.appendChild(space);
      }
      curEvIdx = s.evIdx;
      const ev = utt.events[curEvIdx];
      curWordEl = document.createElement('span');
      curWordEl.className = 'word-unit';
      if (ev.kind === 'ghost') curWordEl.classList.add('ghost');
      stage.appendChild(curWordEl);
      sched.wordSpans[curEvIdx].el = curWordEl;
    }
    const span = document.createElement('span');
    span.className = 'letter';
    span.textContent = s.char;
    span.style.fontVariationSettings = `"PROL" 0, "STTR" 0`;
    curWordEl.appendChild(span);
    s.el = span;
  });

  return sched;
}

/* =========================================================================
   ANCHORS, AUDIO, PLAYER STATE — same approach as v3
   ========================================================================= */

const ANCHOR_KEY = 'megamgem_anchors_v5';
let anchors = {};
function loadAnchors() {
  try { anchors = JSON.parse(localStorage.getItem(ANCHOR_KEY) || '{}'); } catch(e) { anchors = {}; }
  updateAnchorCount();
}
function saveAnchors() { localStorage.setItem(ANCHOR_KEY, JSON.stringify(anchors)); updateAnchorCount(); }
function updateAnchorCount() {
  const n = Object.keys(anchors).length;
  document.getElementById('anchorCount').textContent = n > 0 ? `${n} anchors set` : 'no anchors yet';
  paintMarkers();
}

function utteranceDuration(utt) {
  const sched = buildUtteranceSchedule(utt);
  return sched.totalDuration;
}

function computeUtteranceStarts(audioMs) {
  const N = TIMELINE.length;
  const starts = new Array(N).fill(null);
  Object.keys(anchors).forEach(k => {
    const idx = parseInt(k);
    if (idx >= 0 && idx < N) starts[idx] = anchors[k];
  });
  const anchorIdxs = Object.keys(anchors).map(Number).sort((a,b) => a - b);
  if (anchorIdxs.length === 0) {
    if (audioMs && audioMs > 0) {
      const counts = TIMELINE.map(u => {
        let c = 0; u.events.forEach(e => c += (e.target || e.text || '').length); return Math.max(c, 1);
      });
      const total = counts.reduce((a,b) => a+b, 0);
      let cum = 0;
      for (let i = 0; i < N; i++) { starts[i] = (cum / total) * audioMs; cum += counts[i]; }
    } else {
      let cum = 0;
      for (let i = 0; i < N; i++) { starts[i] = cum; cum += utteranceDuration(TIMELINE[i]) + TIMING.endOfUtterance; }
    }
    return starts;
  }
  if (starts[anchorIdxs[0]] != null && anchorIdxs[0] > 0) {
    let t = starts[anchorIdxs[0]];
    for (let i = anchorIdxs[0] - 1; i >= 0; i--) {
      const dur = utteranceDuration(TIMELINE[i]) + TIMING.endOfUtterance;
      t -= dur; starts[i] = Math.max(0, t);
    }
  }
  for (let a = 0; a < anchorIdxs.length - 1; a++) {
    const i1 = anchorIdxs[a], i2 = anchorIdxs[a+1];
    if (i2 - i1 <= 1) continue;
    const t1 = starts[i1], t2 = starts[i2];
    const charSum = []; let total = 0;
    for (let i = i1; i < i2; i++) {
      let c = 0; TIMELINE[i].events.forEach(e => c += (e.target || e.text || '').length);
      c = Math.max(c, 1); charSum.push(c); total += c;
    }
    let cum = 0;
    for (let i = i1; i < i2; i++) { starts[i] = t1 + (cum / total) * (t2 - t1); cum += charSum[i - i1]; }
  }
  const lastIdx = anchorIdxs[anchorIdxs.length - 1];
  if (lastIdx < N - 1) {
    let t = starts[lastIdx];
    let pace = TIMING.charTime;
    if (audioMs) {
      let chars = 0;
      for (let i = lastIdx; i < N; i++) TIMELINE[i].events.forEach(e => chars += (e.target || e.text || '').length);
      pace = Math.max(50, (audioMs - t) / Math.max(chars, 1));
    }
    for (let i = lastIdx + 1; i < N; i++) {
      let chars = 0; TIMELINE[i-1].events.forEach(e => chars += (e.target || e.text || '').length);
      t += chars * pace + TIMING.endOfUtterance; starts[i] = t;
    }
  }
  return starts;
}

let utteranceStarts = [];
let totalDuration = 0;
let currentUtteranceIdx = -1;
let currentRender = null;
let playing = false;
let audioLoaded = false;
let speed = 1.0;
let baseTime = 0;
let pauseAccum = 0;

const audio = document.getElementById('audio');
const utteranceEl = document.getElementById('utterance');
const stutterTag = document.getElementById('stutterTag');
const utteranceCounter = document.getElementById('utteranceCounter');
const elapsedEl = document.getElementById('elapsed');
const timelineProgress = document.getElementById('timelineProgress');
const timelineEvents = document.getElementById('timelineEvents');
const timecode = document.getElementById('timecode');
const playBtn = document.getElementById('playBtn');

function rebuildTiming() {
  const audioDur = audio.duration ? audio.duration * 1000 : null;
  utteranceStarts = computeUtteranceStarts(audioDur);
  if (audioDur) totalDuration = audioDur;
  else totalDuration = utteranceStarts[utteranceStarts.length - 1] +
                       utteranceDuration(TIMELINE[TIMELINE.length - 1]);
  paintMarkers();
}
function paintMarkers() {
  if (!totalDuration) return;
  timelineEvents.innerHTML = '';
  utteranceStarts.forEach((t, i) => {
    const m = document.createElement('div');
    m.className = 'marker';
    if (anchors[i] != null) m.classList.add('anchor');
    m.style.left = (t / totalDuration * 100) + '%';
    timelineEvents.appendChild(m);
  });
}

function getCurrentTime() {
  if (audioLoaded) return audio.currentTime * 1000;
  return performance.now() - baseTime;
}

function renderAtTime(t) {
  let idx = -1;
  for (let i = 0; i < utteranceStarts.length; i++) {
    if (t >= utteranceStarts[i]) idx = i; else break;
  }
  if (idx < 0) {
    if (currentUtteranceIdx !== -1) {
      currentUtteranceIdx = -1;
      utteranceEl.innerHTML = '';
      stutterTag.style.opacity = 0;
    }
    timelineProgress.style.width = '0%';
    return;
  }
  if (idx !== currentUtteranceIdx) {
    currentUtteranceIdx = idx;
    currentRender = renderUtterance(TIMELINE[idx]);
    utteranceCounter.textContent = String(idx + 1).padStart(2, '0') + ' / ' +
                                    String(TIMELINE.length).padStart(2, '0');
  }

  const utStart = utteranceStarts[idx];
  const nextStart = (idx < utteranceStarts.length - 1) ? utteranceStarts[idx + 1] : totalDuration;
  const utteranceSpan = nextStart - utStart;
  const localT = t - utStart;
  const scale = currentRender.totalDuration > 0 ?
                Math.max(0.3, (utteranceSpan * 0.9) / currentRender.totalDuration) : 1;
  const scaledLocalT = localT / scale;

  // Render each letter
  currentRender.schedule.forEach(s => {
    if (scaledLocalT >= s.appearAt) {
      if (!s.el.classList.contains('visible')) {
        s.el.classList.add('visible');
      }
      if (s.animatesProl) {
        const sinceAppear = scaledLocalT - s.appearAt;
        const rampDur = s.prolongIntensity * TIMING.prolongHoldPerDash;
        let prol = 0;
        if (sinceAppear < 50) prol = 0;
        else if (sinceAppear >= 50 + rampDur) prol = 1000;
        else prol = ((sinceAppear - 50) / rampDur) * 1000;
        s.el.style.fontVariationSettings = `"PROL" ${Math.round(prol)}, "STTR" 0`;
      } else {
        s.el.style.fontVariationSettings = `"PROL" ${s.prol}, "STTR" ${s.sttr}`;
      }
    } else {
      // Not yet appeared
      s.el.classList.remove('visible');
    }
  });

  // Ghost word strikethrough handling
  currentRender.wordSpans.forEach(ws => {
    if (!ws.el) return;
    const utt = TIMELINE[idx];
    const ev = utt.events[ws.eventIdx];
    if (ev.kind === 'ghost') {
      const struckTime = ws.endT;
      if (scaledLocalT > struckTime) {
        ws.el.classList.add('struck');
        // Fade-out after some time
        const since = scaledLocalT - struckTime;
        if (since > 100) {
          const fadeT = Math.min(1, (since - 100) / TIMING.ghostFadeOut);
          ws.el.style.opacity = 1 - fadeT * 0.7; // fade to 30% (still visible as residual)
        }
      } else {
        ws.el.classList.remove('struck');
        ws.el.style.opacity = 1;
      }
    }
  });

  // Stutter tag based on current word span (v5: stutters[])
  let activeStutter = null;
  currentRender.wordSpans.forEach(ws => {
    if (ws.stutters && ws.stutters.length > 0 && scaledLocalT >= ws.startT && scaledLocalT <= ws.endT) {
      activeStutter = ws.stutters[0];  // show the first stutter on this word
    }
  });
  if (activeStutter) {
    const labelMap = {'prolong':'PROLONG','repeat':'REPEAT','repeat-dash':'REPEAT-DASH','mixed':'MIXED'};
    let intensity = activeStutter.intensity;
    if (activeStutter.type === 'mixed') intensity = `${activeStutter.repeat_count}+${activeStutter.prolong_intensity}`;
    stutterTag.innerHTML = `<b>${labelMap[activeStutter.type] || activeStutter.type.toUpperCase()}</b> · ${activeStutter.letter} · ×${intensity}`;
    stutterTag.style.opacity = 1;
  } else {
    stutterTag.style.opacity = 0;
  }

  timelineProgress.style.width = (t / totalDuration * 100) + '%';
  elapsedEl.textContent = `${formatTime(t)} / ${formatTime(totalDuration)}`;
  timecode.innerHTML = `<b>${formatTime(t)}</b> / ${formatTime(totalDuration)}`;
}

function tick() {
  if (!playing) return;
  const t = getCurrentTime();
  if (t >= totalDuration) { pause(); return; }
  renderAtTime(t);
  requestAnimationFrame(tick);
}
function play() {
  playing = true; playBtn.textContent = '❚❚ Pause';
  if (audioLoaded) { audio.playbackRate = speed; audio.play().catch(()=>{}); }
  else baseTime = performance.now() - pauseAccum;
  tick();
}
function pause() {
  playing = false; playBtn.textContent = '▶ Play';
  if (audioLoaded) audio.pause();
  else pauseAccum = performance.now() - baseTime;
}

playBtn.addEventListener('click', () => { playing ? pause() : play(); });

document.getElementById('speedSlider').addEventListener('input', (e) => {
  speed = parseFloat(e.target.value);
  document.getElementById('speedValue').textContent = speed.toFixed(2) + '×';
  if (audioLoaded) audio.playbackRate = speed;
});
document.getElementById('timeline').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const t = x * totalDuration;
  if (audioLoaded) audio.currentTime = t / 1000;
  else { baseTime = performance.now() - t; pauseAccum = t; }
  renderAtTime(t);
});

const audioZone = document.getElementById('audioZone');
const audioInput = document.getElementById('audioInput');
const audioZoneLabel = document.getElementById('audioZoneLabel');
audioZone.addEventListener('click', () => audioInput.click());
audioZone.addEventListener('dragover', e => { e.preventDefault(); audioZone.classList.add('dragover'); });
audioZone.addEventListener('dragleave', () => audioZone.classList.remove('dragover'));
audioZone.addEventListener('drop', e => {
  e.preventDefault(); audioZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('audio/')) loadAudio(f);
});
audioInput.addEventListener('change', () => { if (audioInput.files[0]) loadAudio(audioInput.files[0]); });

function loadAudio(file) {
  audio.src = URL.createObjectURL(file);
  audio.addEventListener('loadedmetadata', () => {
    audioLoaded = true;
    audioZone.classList.add('has-audio');
    audioZoneLabel.textContent = `Loaded: ${file.name} · ${formatTime(audio.duration*1000)}`;
    rebuildTiming(); renderAtTime(0);
  }, { once: true });
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyA' && !e.metaKey && !e.ctrlKey) {
    if (currentUtteranceIdx >= 0) {
      const t = getCurrentTime();
      const savedIdx = currentUtteranceIdx;
      anchors[currentUtteranceIdx] = t; saveAnchors();
      // Rebuild timing without disrupting the current render
      const savedRender = currentRender;
      rebuildTiming();
      // Restore the current utterance so the animation doesn't restart
      currentUtteranceIdx = savedIdx;
      currentRender = savedRender;
      stutterTag.innerHTML = `<b>ANCHOR SET</b> for utterance ${savedIdx + 1} at ${formatTime(t)}`;
      stutterTag.style.opacity = 1;
      setTimeout(() => stutterTag.style.opacity = 0, 1200);
    }
  } else if (e.code === 'Space') {
    e.preventDefault(); playing ? pause() : play();
  } else if (e.code === 'ArrowRight') {
    if (currentUtteranceIdx >= 0 && currentUtteranceIdx < TIMELINE.length - 1) {
      const t = utteranceStarts[currentUtteranceIdx + 1];
      if (audioLoaded) audio.currentTime = t / 1000;
      else { baseTime = performance.now() - t; pauseAccum = t; }
      renderAtTime(t);
    }
  } else if (e.code === 'ArrowLeft') {
    if (currentUtteranceIdx > 0) {
      const t = utteranceStarts[currentUtteranceIdx - 1];
      if (audioLoaded) audio.currentTime = t / 1000;
      else { baseTime = performance.now() - t; pauseAccum = t; }
      renderAtTime(t);
    }
  }
});

document.getElementById('clearAnchors').addEventListener('click', () => {
  if (confirm('Clear all anchors?')) { anchors = {}; saveAnchors(); rebuildTiming(); renderAtTime(getCurrentTime()); }
});
document.getElementById('exportAnchors').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(anchors, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'megamgem-anchors.json'; a.click();
});
document.getElementById('importAnchors').addEventListener('click', () => {
  document.getElementById('importAnchorsInput').click();
});
document.getElementById('importAnchorsInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      anchors = {};
      Object.keys(imported).forEach(k => { anchors[parseInt(k)] = imported[k]; });
      saveAnchors(); rebuildTiming(); renderAtTime(getCurrentTime());
      stutterTag.innerHTML = `<b>IMPORTED</b> ${Object.keys(anchors).length} anchors`;
      stutterTag.style.opacity = 1;
      setTimeout(() => stutterTag.style.opacity = 0, 2000);
    } catch(err) {
      alert('Failed to parse anchors JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
});

function formatTime(ms) {
  if (!ms || ms < 0) ms = 0;
  const s = Math.floor(ms / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

loadAnchors(); rebuildTiming(); renderAtTime(0);
</script>
</body>
</html>
